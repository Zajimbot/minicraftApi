services:
  postgres:
    image: postgres:15-alpine
    container_name: minicraft_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: minicraftDB  
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  
    networks:
      - minicraft_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d minicraftDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: minicraft_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: minicraftDB
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - minicraft_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  minicraft_network:
    driver: bridge
